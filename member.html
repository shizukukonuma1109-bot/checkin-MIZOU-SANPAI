<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEMBER">

  <title>MEMBER Counter</title>
  <style>
    :root {
      --thai-color: rgba(0, 122, 255, 0.85);
      --non-thai-color: rgba(52, 199, 89, 0.85);
      --minus-color: rgba(255, 255, 255, 0.15);
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, rgba(10, 50, 120, 0.95), rgba(20, 80, 180, 0.95));
      padding: 25px;
      text-align: center;
      font-size: 55px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 10;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 10px 0;
      text-align: center;
    }

    .counter-display {
      font-size: 110px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 10px 0 20px 0;
      z-index: 5;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    .main-footprint {
      width: 140px;
      height: 140px;
      filter: drop-shadow(2px 4px 10px rgba(0,0,0,0.5));
      transition: transform 0.1s;
    }
    .card-thai .main-footprint { fill: rgba(140, 200, 255, 0.9); }
    .card-non-thai .main-footprint { fill: rgba(150, 255, 170, 0.9); }

    .footprint-zone:active .main-footprint {
      transform: scale(0.9);
    }

    /* アニメーション用のミニ足跡 */
    .walking-step {
      position: absolute;
      width: 65px;
      height: 65px;
      opacity: 0;
      pointer-events: none;
    }
    .card-thai .walking-step { fill: rgba(0, 122, 255, 0.85); }
    .card-non-thai .walking-step { fill: rgba(52, 199, 89, 0.85); }

    .btn-minus {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background-color: var(--minus-color);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
      z-index: 10;
    }
    .btn-minus:active {
      background-color: rgba(255, 59, 48, 0.6);
    }

    @keyframes walkAwayLeft {
      0% { transform: translateY(0) rotate(-10deg) scale(1); opacity: 0.9; }
      100% { transform: translateY(-180px) translateX(-45px) rotate(-20deg) scale(0.6); opacity: 0; }
    }
    @keyframes walkAwayRight {
      0% { transform: translateY(-70px) translateX(45px) rotate(10deg) scale(0.9); opacity: 0.9; }
      100% { transform: translateY(-250px) translateX(25px) rotate(5deg) scale(0.5); opacity: 0; }
    }
    @keyframes walkAwayFinal {
      0% { transform: translateY(-140px) translateX(-25px) rotate(-10deg) scale(0.8); opacity: 0.9; }
      100% { transform: translateY(-320px) translateX(-50px) rotate(-25deg) scale(0.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">MEMBER</div>
  
  <div class="container">
    <div class="card card-thai">
      <h2 class="card-title">THAI</h2>
      <div class="counter-display" id="count-m-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-Thai', 1, this)">
        <svg class="main-footprint" viewBox="0 0 100 100">
          <path d="M48,38 C43,45 42,56 46,67 C49,75 51,84 48,91 C46,95 39,96 36,92 C32,87 31,77 33,67 C35,56 34,44 40,36 C44,30 50,32 48,38 Z M45,23 C48,23 49,27 47,29 C45,31 41,29 41,26 C41,24 43,23 45,23 Z M55,24 C58,25 58,29 55,31 C53,32 50,30 50,27 C50,25 52,24 55,24 Z M64,28 C66,29 66,33 63,34 C61,35 58,33 59,30 C59,28 62,27 64,28 Z M71,34 C73,35 72,39 70,40 C68,41 65,39 66,36 C66,34 69,33 71,34 Z M77,42 C78,44 77,47 75,48 C73,49 71,46 72,44 C72,42 75,41 77,42 Z"/>
        </svg>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-Thai', -1)">−</button>
    </div>

    <div class="card card-non-thai">
      <h2 class="card-title">NON THAI</h2>
      <div class="counter-display" id="count-m-non-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-NonThai', 1, this)">
        <svg class="main-footprint" viewBox="0 0 100 100">
          <path d="M48,38 C43,45 42,56 46,67 C49,75 51,84 48,91 C46,95 39,96 36,92 C32,87 31,77 33,67 C35,56 34,44 40,36 C44,30 50,32 48,38 Z M45,23 C48,23 49,27 47,29 C45,31 41,29 41,26 C41,24 43,23 45,23 Z M55,24 C58,25 58,29 55,31 C53,32 50,30 50,27 C50,25 52,24 55,24 Z M64,28 C66,29 66,33 63,34 C61,35 58,33 59,30 C59,28 62,27 64,28 Z M71,34 C73,35 72,39 70,40 C68,41 65,39 66,36 C66,34 69,33 71,34 Z M77,42 C78,44 77,47 75,48 C73,49 71,46 72,44 C72,42 75,41 77,42 Z"/>
        </svg>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-NonThai', -1)">−</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxIZEpf7CUc8tx0NUEKLmMIZqHpm8nPTfiQoRf9RNM4v9be4-wupokeSOI6CTagOc5w/exec";

    let currentCounts = { mThai: 0, mNonThai: 0 };

    window.addEventListener('DOMContentLoaded', fetchCurrentCounts);
    setInterval(fetchCurrentCounts, 10000);

    // アニメーション用の「左足跡」と「右足跡」のグラフィックデータ
    const leftFootSVG = `<svg viewBox="0 0 100 100"><path d="M52,38 C57,45 58,56 54,67 C51,75 49,84 52,91 C54,95 61,96 64,92 C68,87 69,77 67,67 C65,56 66,44 60,36 C56,30 50,32 52,38 Z M55,23 C52,23 51,27 53,29 C55,31 59,29 59,26 C59,24 57,23 55,23 Z M45,24 C42,25 42,29 45,31 C47,32 50,30 50,27 C50,25 48,24 45,24 Z M36,28 C34,29 34,33 37,34 C39,35 42,33 41,30 C41,28 38,27 36,28 Z M29,34 C27,35 28,39 30,40 C32,41 35,39 34,36 C34,34 31,33 29,34 Z M23,42 C22,44 23,47 25,48 C27,49 29,46 28,44 C28,42 25,41 23,42 Z"/></svg>`;
    const rightFootSVG = `<svg viewBox="0 0 100 100"><path d="M48,38 C43,45 42,56 46,67 C49,75 51,84 48,91 C46,95 39,96 36,92 C32,87 31,77 33,67 C35,56 34,44 40,36 C44,30 50,32 48,38 Z M45,23 C48,23 49,27 47,29 C45,31 41,29 41,26 C41,24 43,23 45,23 Z M55,24 C58,25 58,29 55,31 C53,32 50,30 50,27 C50,25 52,24 55,24 Z M64,28 C66,29 66,33 63,34 C61,35 58,33 59,30 C59,28 62,27 64,28 Z M71,34 C73,35 72,39 70,40 C68,41 65,39 66,36 C66,34 69,33 71,34 Z M77,42 C78,44 77,47 75,48 C73,49 71,46 72,44 C72,42 75,41 77,42 Z"/></svg>`;

    function handleClick(type, value, element) {
      if (type === 'Member-Thai') {
        currentCounts.mThai = Math.max(0, currentCounts.mThai + value);
        document.getElementById('count-m-thai').innerText = currentCounts.mThai;
      } else if (type === 'Member-NonThai') {
        currentCounts.mNonThai = Math.max(0, currentCounts.mNonThai + value);
        document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
      }

      if (value === 1 && element) {
        spawnFootprints(element);
      }
      sendCountBackend(type, value);
    }

    function spawnFootprints(zone) {
      const animations = ['walkAwayLeft', 'walkAwayRight', 'walkAwayFinal'];
      // 左足、右足、左足の順に交互に生成
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 300, 600];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 0.8s ease-out forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 800);
        }, delays[index]);
      });
    }

    async function sendCountBackend(type, value) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ type: type, value: value })
        });
      } catch (error) { console.error("Backend send failed:", error); }
    }

    async function fetchCurrentCounts() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        if (data) {
          currentCounts.mThai = data.mThai;
          currentCounts.mNonThai = data.mNonThai;
          document.getElementById('count-m-thai').innerText = currentCounts.mThai;
          document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
        }
      } catch (error) { console.error("Fetch failed:", error); }
    }
  </script>
</body>
</html>
