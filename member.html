<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="THAI">

  <title>THAI Counter</title>
  <style>
    :root {
      --minus-bg: rgba(230, 230, 230, 0.85);
      --minus-border: #2ecc71;
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: relative;
      padding: 25px;
      text-align: center;
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
      z-index: 10;
      letter-spacing: 2px;
      text-shadow: 1px 2px 8px rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      
      background-color: #060b19;
      background-image: 
        radial-gradient(circle at 20% -20%, #00b4d8 0%, transparent 65%),
        radial-gradient(circle at 80% 40%, #0077b6 0%, transparent 70%),
        radial-gradient(circle at 50% 130%, #0c1844 0%, transparent 90%);
      background-blend-mode: screen;
    }

    .btn-reset {
      position: absolute;
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-appearance: none;
      appearance: none;
      z-index: 11;
    }
    .btn-reset:active {
      opacity: 0.5;
      transform: translateY(-50%) scale(0.9);
    }
    .btn-reset svg {
      width: 36px;
      height: 36px;
      fill: rgba(255, 255, 255, 0.95);
      filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.4));
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 10px 0;
      text-align: center;
      z-index: 6;
    }

    .counter-display {
      font-size: 110px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 10px 0 10px 0;
      z-index: 6;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* ボタン中央のテキスト設定を削除し、完全に空白に */
    .ripple-button {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.1s;
      z-index: 3;
      cursor: pointer;
    }

    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      margin-top: -90px;
      margin-left: -90px;
      border-radius: 50%;
      border: 3px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 5px; }
      20% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 0.5px; }
    }

    .ripple-button:active {
      transform: scale(0.94);
    }

    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .btn-minus {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background-color: var(--minus-bg) !important;
      border: 2px solid var(--minus-border) !important;
      border-radius: 14px !important;
      -webkit-appearance: none;
      appearance: none;
      box-shadow: none;
      color: #000000 !important;
      font-size: 36px !important;
      font-weight: 900 !important;
      line-height: 1 !important;
      cursor: pointer;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 10;
    }
    .btn-minus:active {
      background-color: rgba(255, 59, 48, 0.3) !important;
    }

    @keyframes walkUpLeft {
      0% { transform: translateY(300px) translateX(-60px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-150px) translateX(-60px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-220px) translateX(-60px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(160px) translateX(60px) rotate(10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-280px) translateX(60px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(-350px) translateX(60px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-40px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-420px) translateX(-40px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-500px) translateX(-40px) rotate(-10deg) scale(0.85); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">
    🇹🇭 THAI 🇹🇭
    <button class="btn-reset" onclick="triggerReset()" oncontextmenu="return false;">
      <svg viewBox="0 0 24 24">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
    </button>
  </div>
  
  <div class="container">
    <div class="card">
      <h2 class="card-title">MEMBER</h2>
      <div class="counter-display" id="count-m-thai">0</div>
      
      <div class="footprint-zone">
        <div class="ripple-button" onclick="handleCircleClick('Member-Thai', this)"></div>
      </div>

      <button class="btn-minus" onclick="handleMinusClick('Member-Thai')">−</button>
    </div>

    <div class="card">
      <h2 class="card-title">VISITOR</h2>
      <div class="counter-display" id="count-v-thai">0</div>
      
      <div class="footprint-zone">
        <div class="ripple-button" onclick="handleCircleClick('Visitor-Thai', this)"></div>
      </div>

      <button class="btn-minus" onclick="handleMinusClick('Visitor-Thai')">−</button>
    </div>
  </div>

  <script>
    let currentCounts = {
      mThai: parseInt(localStorage.getItem('mThai')) || 0,
      vThai: parseInt(localStorage.getItem('vThai')) || 0
    };

    window.addEventListener('DOMContentLoaded', () => {
      updateDisplay();
      window.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
    });

    function updateDisplay() {
      document.getElementById('count-m-thai').innerText = currentCounts.mThai;
      document.getElementById('count-v-thai').innerText = currentCounts.vThai;
    }

    function handleCircleClick(type, circleElement) {
      if (type === 'Member-Thai') {
        currentCounts.mThai++;
        localStorage.setItem('mThai', currentCounts.mThai);
      } else {
        currentCounts.vThai++;
        localStorage.setItem('vThai', currentCounts.vThai);
      }
      updateDisplay();

      const zone = circleElement.parentElement;
      createTripleRipple(circleElement);
      spawnFootprints(zone);
    }

    function handleMinusClick(type) {
      if (type === 'Member-Thai') {
        currentCounts.mThai = Math.max(0, currentCounts.mThai - 1);
        localStorage.setItem('mThai', currentCounts.mThai);
      } else {
        currentCounts.vThai = Math.max(0, currentCounts.vThai - 1);
        localStorage.setItem('vThai', currentCounts.vThai);
      }
      updateDisplay();
    }

    function createTripleRipple(button) {
      const delays = [0, 700, 1400]; 
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 4000);
        }, delay);
      });
    }

    function spawnFootprints(zone) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 650, 1300];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 2400);
        }, delays[index]);
      });
    }

    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.78);"><path d="M52,85 C45,85 42,75 44,62 C46,52 38,44 40,34 C42,26 52,25 56,32 C60,39 56,48 58,58 C60,68 60,85 52,85 Z"/><circle cx="61" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="41" cy="19" r="4"/><circle cx="33" cy="24" r="3.5"/><circle cx="27" cy="31" r="3"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.78);"><path d="M48,85 C55,85 58,75 56,62 C54,52 62,44 60,34 C58,26 48,25 44,32 C40,39 44,48 42,58 C40,68 40,85 48,85 Z"/><circle cx="39" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="59" cy="19" r="4"/><circle cx="67" cy="24" r="3.5"/><circle cx="73" cy="31" r="3"/></svg>`;

    function triggerReset() {
      if (confirm("Reset MEMBER / VISITOR counts to 0?")) {
        currentCounts.mThai = 0;
        currentCounts.vThai = 0;
        localStorage.setItem('mThai', 0);
        localStorage.setItem('vThai', 0);
        updateDisplay();
      }
    }
  </script>
</body>
</html>
