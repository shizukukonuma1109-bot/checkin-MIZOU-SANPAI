<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEMBER">

  <title>MEMBER Counter</title>
  <style>
    :root {
      --minus-color: rgba(255, 255, 255, 0.15);
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, rgba(10, 50, 120, 0.95), rgba(20, 80, 180, 0.95));
      padding: 25px;
      text-align: center;
      font-size: 55px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 10;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 10px 0;
      text-align: center;
      z-index: 6;
    }

    .counter-display {
      font-size: 110px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 10px 0 20px 0;
      z-index: 6;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    /* 水色に光る波紋サークル（固定ボタン） */
    .ripple-button {
      position: relative;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.9) 0%, rgba(30, 144, 255, 0.4) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 25px rgba(0, 191, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.1s;
      z-index: 3;
    }

    /* 中心から外側へ広がる波紋エフェクト */
    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130px;
      height: 130px;
      margin-top: -65px;
      margin-left: -65px;
      border-radius: 50%;
      border: 5px solid rgba(0, 225, 255, 0.8);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.2) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 0.75s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 8px; }
      40% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 1px; }
    }

    .footprint-zone:active .ripple-button {
      transform: scale(0.92);
    }

    /* トコトコ歩き出す足跡の設定（350px） */
    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .btn-minus {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background-color: var(--minus-color);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
      z-index: 10;
    }
    .btn-minus:active {
      background-color: rgba(255, 59, 48, 0.6);
    }

    /* 350px用のアニメーション */
    @keyframes walkUpLeft {
      0% { transform: translateY(280px) translateX(-70px) rotate(-10deg); opacity: 0; }
      10% { opacity: 0.75; }
      80% { transform: translateY(180px) translateX(-70px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(150px) translateX(-70px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(150px) translateX(70px) rotate(10deg); opacity: 0; }
      10% { opacity: 0.75; }
      80% { transform: translateY(50px) translateX(70px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(20px) translateX(70px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-50px) rotate(-10deg); opacity: 0; }
      10% { opacity: 0.75; }
      80% { transform: translateY(-80px) translateX(-50px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-110px) translateX(-50px) rotate(-10deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">MEMBER</div>
  
  <div class="container">
    <div class="card card-thai">
      <h2 class="card-title">THAI</h2>
      <div class="counter-display" id="count-m-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-Thai', 1, this)">
        <div class="ripple-button"></div>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-Thai', -1)">−</button>
    </div>

    <div class="card card-non-thai">
      <h2 class="card-title">NON THAI</h2>
      <div class="counter-display" id="count-m-non-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-NonThai', 1, this)">
        <div class="ripple-button"></div>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-NonThai', -1)">−</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxIZEpf7CUc8tx0NUEKLmMIZqHpm8nPTfiQoRf9RNM4v9be4-wupokeSOI6CTagOc5w/exec";

    let currentCounts = { mThai: 0, mNonThai: 0 };

    window.addEventListener('DOMContentLoaded', fetchCurrentCounts);
    setInterval(fetchCurrentCounts, 10000);

    // ★画像から精密トレースした金文の足跡パスデータ
    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.75);"><path d="M44.6,5.0L41.8,7.7L40.2,11.0L39.3,16.6L35.4,13.3L32.4,13.0L31.4,13.8L30.6,19.9L33.0,23.8L30.6,22.3L27.6,22.6L25.9,23.6L25.3,25.1L25.9,27.9L28.7,30.8L27.2,33.3L27.1,37.2L31.1,45.5L34.5,50.1L40.6,63.7L41.9,69.5L40.7,78.2L42.5,85.2L44.8,89.5L46.4,91.3L48.4,92.5L52.8,94.5L55.7,94.9L58.5,94.2L61.0,91.8L62.1,88.1L60.9,81.1L57.9,74.5L52.3,64.4L51.8,61.7L54.7,56.8L59.1,51.8L62.7,44.9L64.3,37.9L62.3,33.5L59.7,33.3L54.9,34.8L52.5,33.2L52.6,30.3L53.9,27.1L53.9,23.7L51.5,18.4L47.5,19.3L44.8,22.2L44.3,21.5L44.2,14.6L46.3,9.4Z"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.75);"><path d="M37.7,5.0L34.8,6.4L29.7,11.9L28.5,19.5L29.1,21.0L28.8,25.1L30.9,27.0L31.8,29.7L28.8,36.4L28.8,39.9L35.0,52.9L36.1,57.3L33.9,66.0L33.7,72.0L34.5,77.4L36.1,83.0L36.9,83.5L38.7,87.8L39.6,87.8L40.7,90.2L39.8,91.3L42.3,94.7L46.4,95.0L54.5,92.5L56.1,90.1L56.9,82.4L55.4,75.4L52.2,68.7L47.1,59.3L46.9,53.8L51.3,47.0L56.9,39.1L61.7,29.8L61.4,26.5L58.1,26.1L51.8,28.7L50.5,27.1L51.8,23.4L53.0,18.8L52.0,14.9L46.2,17.4L43.8,21.0L43.5,19.3L42.1,12.7L43.4,8.1Z"/></svg>`;

    function handleClick(type, value, element) {
      if (type === 'Member-Thai') {
        currentCounts.mThai = Math.max(0, currentCounts.mThai + value);
        document.getElementById('count-m-thai').innerText = currentCounts.mThai;
      } else if (type === 'Member-NonThai') {
        currentCounts.mNonThai = Math.max(0, currentCounts.mNonThai + value);
        document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
      }

      if (value === 1 && element) {
        createRipple(element);
        spawnFootprints(element, type);
      }
      sendCountBackend(type, value);
    }

    // しずくが落ちたような波紋を作る関数
    function createRipple(zone) {
      const button = zone.querySelector('.ripple-button');
      if (button) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple-effect';
        button.appendChild(ripple);
        setTimeout(() => ripple.remove(), 750);
      }
    }

    function spawnFootprints(zone, type) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = type.includes('Thai') && !type.includes('Non') 
        ? [leftFootSVG, rightFootSVG, leftFootSVG] 
        : [rightFootSVG, leftFootSVG, rightFootSVG];
      
      const delays = [0, 500, 1000];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 1.6s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 1600);
        }, delays[index]);
      });
    }

    async function sendCountBackend(type, value) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ type: type, value: value })
        });
      } catch (error) { console.error("Backend send failed:", error); }
    }

    async function fetchCurrentCounts() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        if (data) {
          currentCounts.mThai = data.mThai;
          currentCounts.mNonThai = data.mNonThai;
          document.getElementById('count-m-thai').innerText = currentCounts.mThai;
          document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
        }
      } catch (error) { console.error("Fetch failed:", error); }
    }
  </script>
</body>
</html>
