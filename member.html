<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEMBER">

  <title>MEMBER Counter</title>
  <style>
    :root {
      --minus-color: rgba(255, 255, 255, 0.15);
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, rgba(10, 50, 120, 0.95), rgba(20, 80, 180, 0.95));
      padding: 25px;
      text-align: center;
      font-size: 55px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 10;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 10px 0;
      text-align: center;
      z-index: 6;
    }

    .counter-display {
      font-size: 110px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 10px 0 10px 0;
      z-index: 6;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .ripple-button {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.1s;
      z-index: 3;
    }

    /* ★波紋アニメーションを1.6秒に伸ばして、もっと優雅でスローに */
    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      margin-top: -90px;
      margin-left: -90px;
      border-radius: 50%;
      border: 4px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.15) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 1.6s cubic-bezier(0.1, 0.4, 0.2, 1) forwards;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 6px; }
      30% { opacity: 0.9; }
      100% { transform: scale(2.4); opacity: 0; border-width: 0.5px; }
    }

    .footprint-zone:active .ripple-button {
      transform: scale(0.94);
    }

    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .btn-minus {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background-color: var(--minus-color);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 10;
    }
    .btn-minus:active {
      background-color: rgba(255, 59, 48, 0.6);
    }

    @keyframes walkUpLeft {
      0% { transform: translateY(300px) translateX(-60px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-150px) translateX(-60px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-220px) translateX(-60px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(160px) translateX(60px) rotate(10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-280px) translateX(60px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(-350px) translateX(60px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-40px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-420px) translateX(-40px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-500px) translateX(-40px) rotate(-10deg) scale(0.85); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">MEMBER</div>
  
  <div class="container">
    <div class="card card-thai">
      <h2 class="card-title">THAI</h2>
      <div class="counter-display" id="count-m-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-Thai', 1, this)">
        <div class="ripple-button"></div>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-Thai', -1)" style="color: #ffffff !important;">−</button>
    </div>

    <div class="card card-non-thai">
      <h2 class="card-title">NON THAI</h2>
      <div class="counter-display" id="count-m-non-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-NonThai', 1, this)">
        <div class="ripple-button"></div>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-NonThai', -1)" style="color: #ffffff !important;">−</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxIZEpf7CUc8tx0NUEKLmMIZqHpm8nPTfiQoRf9RNM4v9be4-wupokeSOI6CTagOc5w/exec";

    let currentCounts = { mThai: 0, mNonThai: 0 };

    window.addEventListener('DOMContentLoaded', fetchCurrentCounts);
    setInterval(fetchCurrentCounts, 10000);

    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.78);"><path d="M52,85 C45,85 42,75 44,62 C46,52 38,44 40,34 C42,26 52,25 56,32 C60,39 56,48 58,58 C60,68 60,85 52,85 Z"/><circle cx="61" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="41" cy="19" r="4"/><circle cx="33" cy="24" r="3.5"/><circle cx="27" cy="31" r="3"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(0,0,0,0.78);"><path d="M48,85 C55,85 58,75 56,62 C54,52 62,44 60,34 C58,26 48,25 44,32 C40,39 44,48 42,58 C40,68 40,85 48,85 Z"/><circle cx="39" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="59" cy="19" r="4"/><circle cx="67" cy="24" r="3.5"/><circle cx="73" cy="31" r="3"/></svg>`;

    function handleClick(type, value, element) {
      if (type === 'Member-Thai') {
        currentCounts.mThai = Math.max(0, currentCounts.mThai + value);
        document.getElementById('count-m-thai').innerText = currentCounts.mThai;
      } else if (type === 'Member-NonThai') {
        currentCounts.mNonThai = Math.max(0, currentCounts.mNonThai + value);
        document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
      }

      if (value === 1 && element) {
        createTripleRipple(element);
        spawnFootprints(element);
      }
      sendCountBackend(type, value);
    }

    // ★波紋が出る間隔を0.35秒（350ms）に広げ、1つずつ綺麗に湧き出るようにしました
    function createTripleRipple(zone) {
      const button = zone.querySelector('.ripple-button');
      if (!button) return;

      const delays = [0, 350, 700]; 
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 1600);
        }, delay);
      });
    }

    function spawnFootprints(zone) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 650, 1300];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 2400);
        }, delays[index]);
      });
    }

    async function sendCountBackend(type, value) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ type: type, value: value })
        });
      } catch (error) { console.error("Backend send failed:", error); }
    }

    async function fetchCurrentCounts() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        if (data) {
          currentCounts.mThai = data.mThai;
          currentCounts.mNonThai = data.mNonThai;
          document.getElementById('count-m-thai').innerText = currentCounts.mThai;
          document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
        }
      } catch (error) { console.error("Fetch failed:", error); }
    }
  </script>
</body>
</html>
