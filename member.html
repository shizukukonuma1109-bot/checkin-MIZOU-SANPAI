<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEMBER">

  <title>MEMBER Counter</title>
  <style>
    :root {
      --thai-color: rgba(0, 122, 255, 0.85);
      --non-thai-color: rgba(52, 199, 89, 0.85);
      --minus-color: rgba(255, 255, 255, 0.15);
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, rgba(10, 50, 120, 0.95), rgba(20, 80, 180, 0.95));
      padding: 25px;
      text-align: center;
      font-size: 55px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 10;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 10px 0;
      text-align: center;
    }

    /* 人数カウント表示を中央上部に配置 */
    .counter-display {
      font-size: 110px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 10px 0 20px 0;
      z-index: 5;
    }

    /* 足跡のメインタップエリア */
    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    .main-footprint {
      width: 150px;
      height: 150px;
      filter: drop-shadow(2px 4px 10px rgba(0,0,0,0.5));
      transition: transform 0.1s;
    }
    .card-thai .main-footprint { fill: rgba(140, 200, 255, 0.9); }
    .card-non-thai .main-footprint { fill: rgba(150, 255, 170, 0.9); }

    .footprint-zone:active .main-footprint {
      transform: scale(0.9);
    }

    /* アニメーション用ミニ足跡 */
    .walking-step {
      position: absolute;
      width: 65px;
      height: 65px;
      opacity: 0;
      pointer-events: none;
    }
    .card-thai .walking-step { fill: rgba(0, 122, 255, 0.85); }
    .card-non-thai .walking-step { fill: rgba(52, 199, 89, 0.85); }

    /* 左下のマイナス小箱 */
    .btn-minus {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background-color: var(--minus-color);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
      z-index: 10;
    }
    .btn-minus:active {
      background-color: rgba(255, 59, 48, 0.6);
    }

    @keyframes walkAwayLeft {
      0% { transform: translateY(0) rotate(15deg) scale(1); opacity: 0.9; }
      100% { transform: translateY(-180px) translateX(-40px) rotate(5deg) scale(0.6); opacity: 0; }
    }
    @keyframes walkAwayRight {
      0% { transform: translateY(-60px) translateX(40px) rotate(-10deg) scale(0.9); opacity: 0.9; }
      100% { transform: translateY(-240px) translateX(20px) rotate(-15deg) scale(0.5); opacity: 0; }
    }
    @keyframes walkAwayFinal {
      0% { transform: translateY(-130px) translateX(-20px) rotate(10deg) scale(0.8); opacity: 0.9; }
      100% { transform: translateY(-300px) translateX(-50px) rotate(0deg) scale(0.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">MEMBER</div>
  
  <div class="container">
    <div class="card card-thai">
      <h2 class="card-title">THAI</h2>
      <div class="counter-display" id="count-m-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-Thai', 1, this)">
        <svg class="main-footprint" viewBox="0 0 24 24"><path d="M15.5,1.5C14.12,1.5 13,3.18 13,5.25C13,6.86 13.68,8.22 14.62,8.75L13.12,14.75C12.72,16.35 13.71,18 15.35,18C16.82,18 17.89,16.5 17.62,15.06L16.5,9.06C17.38,8.66 18,7.46 18,6C18,3.5 16.88,1.5 15.5,1.5M10.75,8.12C10.06,8.12 9.5,8.94 9.5,9.94C9.5,10.72 9.84,11.38 10.31,11.62L9.56,14.62C9.36,15.42 9.86,16.25 10.68,16.25C11.41,16.25 11.94,15.5 11.81,14.78L11.25,11.78C11.69,11.59 12,11 12,10.31C12,9.12 11.44,8.12 10.75,8.12M7.25,11.12C6.56,11.12 6.00,11.94 6.00,12.94C6.00,13.72 6.34,14.38 6.81,14.62L6.06,17.62C5.86,18.42 6.36,19.25 7.18,19.25C7.91,19.25 8.44,15.5 8.31,14.78L7.75,11.78C8.19,11.59 8.5,11 8.5,10.31C8.5,9.12 7.94,11.12 7.25,11.12M14,19.5C13.17,19.5 12.5,20.17 12.5,21C12.5,21.83 13.17,22.5 14,22.5C14.83,22.5 15.5,21.83 15.5,21C15.5,20.17 14.83,19.5 14,19.5Z"/></svg>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-Thai', -1)">−</button>
    </div>

    <div class="card card-non-thai">
      <h2 class="card-title">NON THAI</h2>
      <div class="counter-display" id="count-m-non-thai">0</div>
      
      <div class="footprint-zone" onclick="handleClick('Member-NonThai', 1, this)">
        <svg class="main-footprint" viewBox="0 0 24 24"><path d="M15.5,1.5C14.12,1.5 13,3.18 13,5.25C13,6.86 13.68,8.22 14.62,8.75L13.12,14.75C12.72,16.35 13.71,18 15.35,18C16.82,18 17.89,16.5 17.62,15.06L16.5,9.06C17.38,8.66 18,7.46 18,6C18,3.5 16.88,1.5 15.5,1.5M10.75,8.12C10.06,8.12 9.5,8.94 9.5,9.94C9.5,10.72 9.84,11.38 10.31,11.62L9.56,14.62C9.36,15.42 9.86,16.25 10.68,16.25C11.41,16.25 11.94,15.5 11.81,14.78L11.25,11.78C11.69,11.59 12,11 12,10.31C12,9.12 11.44,8.12 10.75,8.12M7.25,11.12C6.56,11.12 6.00,11.94 6.00,12.94C6.00,13.72 6.34,14.38 6.81,14.62L6.06,17.62C5.86,18.42 6.36,19.25 7.18,19.25C7.91,19.25 8.44,15.5 8.31,14.78L7.75,11.78C8.19,11.59 8.5,11 8.5,10.31C8.5,9.12 7.94,11.12 7.25,11.12M14,19.5C13.17,19.5 12.5,20.17 12.5,21C12.5,21.83 13.17,22.5 14,22.5C14.83,22.5 15.5,21.83 15.5,21C15.5,20.17 14.83,19.5 14,19.5Z"/></svg>
      </div>

      <button class="btn-minus" onclick="handleClick('Member-NonThai', -1)">−</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxIZEpf7CUc8tx0NUEKLmMIZqHpm8nPTfiQoRf9RNM4v9be4-wupokeSOI6CTagOc5w/exec";

    let currentCounts = { mThai: 0, mNonThai: 0 };

    window.addEventListener('DOMContentLoaded', fetchCurrentCounts);
    setInterval(fetchCurrentCounts, 10000);

    const footprintSVG = `<svg viewBox="0 0 24 24"><path d="M15.5,1.5C14.12,1.5 13,3.18 13,5.25C13,6.86 13.68,8.22 14.62,8.75L13.12,14.75C12.72,16.35 13.71,18 15.35,18C16.82,18 17.89,16.5 17.62,15.06L16.5,9.06C17.38,8.66 18,7.46 18,6C18,3.5 16.88,1.5 15.5,1.5M10.75,8.12C10.06,8.12 9.5,8.94 9.5,9.94C9.5,10.72 9.84,11.38 10.31,11.62L9.56,14.62C9.36,15.42 9.86,16.25 10.68,16.25C11.41,16.25 11.94,15.5 11.81,14.78L11.25,11.78C11.69,11.59 12,11 12,10.31C12,9.12 11.44,8.12 10.75,8.12M7.25,11.12C6.56,11.12 6.00,11.94 6.00,12.94C6.00,13.72 6.34,14.38 6.81,14.62L6.06,17.62C5.86,18.42 6.36,19.25 7.18,19.25C7.91,19.25 8.44,15.5 8.31,14.78L7.75,11.78C8.19,11.59 8.5,11 8.5,10.31C8.5,9.12 7.94,11.12 7.25,11.12M14,19.5C13.17,19.5 12.5,20.17 12.5,21C12.5,21.83 13.17,22.5 14,22.5C14.83,22.5 15.5,21.83 15.5,21C15.5,20.17 14.83,19.5 14,19.5Z"/></svg>`;

    function handleClick(type, value, element) {
      if (type === 'Member-Thai') {
        currentCounts.mThai = Math.max(0, currentCounts.mThai + value);
        document.getElementById('count-m-thai').innerText = currentCounts.mThai;
      } else if (type === 'Member-NonThai') {
        currentCounts.mNonThai = Math.max(0, currentCounts.mNonThai + value);
        document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
      }

      if (value === 1 && element) {
        spawnFootprints(element);
      }
      sendCountBackend(type, value);
    }

    function spawnFootprints(zone) {
      const animations = ['walkAwayLeft', 'walkAwayRight', 'walkAwayFinal'];
      const delays = [0, 300, 600];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = footprintSVG;
          step.style.animation = `${anim} 0.8s ease-out forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 800);
        }, delays[index]);
      });
    }

    async function sendCountBackend(type, value) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ type: type, value: value })
        });
      } catch (error) { console.error("Backend send failed:", error); }
    }

    async function fetchCurrentCounts() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        if (data) {
          currentCounts.mThai = data.mThai;
          currentCounts.mNonThai = data.mNonThai;
          document.getElementById('count-m-thai').innerText = currentCounts.mThai;
          document.getElementById('count-m-non-thai').innerText = currentCounts.mNonThai;
        }
      } catch (error) { console.error("Fetch failed:", error); }
    }
  </script>
</body>
</html>
